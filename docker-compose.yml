services:
  postgres:
    image: postgres:16-alpine
    container_name: caseman-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: caseman
      POSTGRES_USER: caseman
      POSTGRES_PASSWORD: caseman
    ports:
      - "5432:5432"
    volumes:
      - caseman_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caseman -d caseman"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caseman_postgres_data:

